<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Car Crash Traffic Racer 2D</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- //pause and score -->
    <div id="hud" style="display: none">
      <div id="current-score">SCORE: 0</div>
      <button id="pause-btn">||</button>
    </div>
    <!-- //Mobile Controls -->
    <div id="mobile-controls">
      <button id="left-btn">◀</button>
      <button id="right-btn">▶</button>
    </div>

    <!-- //Laptop Controls -->
    <div id="ui-overlay">
      <div id="start-screen" class="screen">
        <h1>CAR CRASH RACER</h1>
        <div class="score-info">
          BEST SCORE: <span id="best-score-display">0</span>
        </div>
        <button id="play-button">START GAME</button>
        <p class="controls-hint">Use Arrow Keys to Move</p>
      </div>
      <!-- START THE GAME -->
      <div id="game-over-screen" class="screen" style="display: none">
        <h1 class="dead-text">GAME OVER</h1>
        <div class="score-info">
          SCORE: <span id="final-score-display">0</span>
        </div>
        <button id="restart-button">TRY AGAIN</button>
      </div>
    </div>
    <canvas id="gameCanvas" width="400" height="700"></canvas>

    <script src="road.js"></script>
    <script type="module" src="game.js"></script>
  </body>
</html>
